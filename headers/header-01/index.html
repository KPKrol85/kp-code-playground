<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Header 01 Component</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header" data-header>
      <div class="header__inner">
        <a class="header__brand" href="#" aria-label="Go to homepage">
          <span class="header__logo" aria-hidden="true">
            <svg
              class="header__logo-icon"
              viewBox="0 0 64 64"
              role="img"
              focusable="false"
            >
              <defs>
                <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#7ea5ff" />
                  <stop offset="100%" stop-color="#8f7dff" />
                </linearGradient>
              </defs>
              <rect x="2" y="2" width="60" height="60" rx="18" fill="url(#logo-gradient)" />
              <path
                d="M20 36.8L27.8 28.2C29.4 26.4 32.2 26.4 33.9 28.2L44 39.4"
                fill="none"
                stroke="white"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="4"
              />
              <circle cx="24" cy="22" r="4" fill="white" />
            </svg>
          </span>
          <span class="header__brand-text">
            <span class="header__brand-title">North Studio</span>
            <span class="header__brand-subtitle">Header 01</span>
          </span>
        </a>

        <button
          class="header__menu-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="header-navigation"
          aria-label="Open main menu"
          data-menu-toggle
        >
          <span class="header__menu-icon" aria-hidden="true">
            <span class="header__menu-line"></span>
            <span class="header__menu-line"></span>
            <span class="header__menu-line"></span>
          </span>
        </button>

        <nav class="header__nav" id="header-navigation" aria-label="Primary" data-nav>
          <ul class="header__nav-list">
            <li class="header__nav-item"><a class="header__nav-link" href="#">Products</a></li>
            <li class="header__nav-item"><a class="header__nav-link" href="#">Solutions</a></li>
            <li class="header__nav-item"><a class="header__nav-link" href="#">Resources</a></li>
            <li class="header__nav-item"><a class="header__nav-link" href="#">Pricing</a></li>
            <li class="header__nav-item"><a class="header__nav-link" href="#">Contact</a></li>
          </ul>
        </nav>

        <button
          class="header__theme-toggle"
          type="button"
          aria-label="Switch to dark theme"
          data-theme-toggle
        >
          <svg
            class="header__theme-icon header__theme-icon--sun"
            viewBox="0 0 24 24"
            aria-hidden="true"
            focusable="false"
          >
            <path
              d="M12 3.75V2m0 20v-1.75M4.93 4.93 3.7 3.7m16.6 16.6-1.23-1.23M20.25 12H22M2 12h1.75m1.18 7.07L3.7 20.3m16.6-16.6-1.23 1.23M16 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.7"
            />
          </svg>
          <svg
            class="header__theme-icon header__theme-icon--moon"
            viewBox="0 0 24 24"
            aria-hidden="true"
            focusable="false"
          >
            <path
              d="M20.34 15.88A8 8 0 1 1 8.12 3.66a7 7 0 1 0 12.22 12.22Z"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.7"
            />
          </svg>
        </button>
      </div>
    </header>

    <main class="demo-content" aria-label="Demo page content">
      <section class="demo-content__section">
        <h1 class="demo-content__title">Reusable Header Pack</h1>
        <p class="demo-content__copy">
          This sample area helps preview sticky behavior, shrink-on-scroll state, and adaptive
          theme appearance for the component.
        </p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
