<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KP Code Digital Vault — Footer UI Panel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div>
        <p class="tag">PROMPT · CODEX</p>
        <h1>KP Code Digital Vault · Panel Footerów</h1>
        <p>
          Wybierz styl stopki i podejrzyj 10 gotowych wariantów od góry do dołu.
          Każdy wariant jest w czystym HTML/CSS/JS.
        </p>
      </div>
      <div class="controls">
        <label for="footerPicker">Szybki skok do wariantu</label>
        <select id="footerPicker" aria-label="Wybór wariantu footera"></select>
      </div>
    </header>

    <main id="footerGallery" class="gallery" aria-live="polite"></main>

    <script src="script.js"></script>
  </body>
</html>
