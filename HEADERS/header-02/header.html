<header class="header-02" data-header-02>
  <div class="header-02__utility" aria-label="Store updates">
    <div class="header-02__container">
      <p class="header-02__utility-text">Complimentary shipping on orders over $100</p>
      <a class="header-02__utility-link" href="#" aria-label="Learn more about shipping and returns">Free returns within 30 days</a>
    </div>
  </div>

  <div class="header-02__main">
    <div class="header-02__container">
      <div class="header-02__left">
        <button
          class="header-02__icon-button header-02__menu-toggle"
          type="button"
          aria-label="Open menu"
          aria-controls="header-02-mobile-nav"
          aria-expanded="false"
          data-header-02-menu-toggle
        >
          <span class="header-02__icon" aria-hidden="true">☰</span>
        </button>

        <a class="header-02__brand" href="#" aria-label="Maison Élan home">
          <span class="header-02__brand-mark" aria-hidden="true">ME</span>
          <span class="header-02__brand-text">Maison Élan</span>
        </a>
      </div>

      <nav class="header-02__nav" aria-label="Primary navigation">
        <ul class="header-02__nav-list">
          <li><a class="header-02__nav-link" href="#">New In</a></li>
          <li><a class="header-02__nav-link" href="#">Women</a></li>
          <li><a class="header-02__nav-link" href="#">Men</a></li>
          <li><a class="header-02__nav-link" href="#">Accessories</a></li>
          <li><a class="header-02__nav-link" href="#">Collections</a></li>
        </ul>
      </nav>

      <div class="header-02__actions">
        <button
          class="header-02__icon-button header-02__search-toggle"
          type="button"
          aria-label="Open search"
          aria-controls="header-02-search-panel"
          aria-expanded="false"
          data-header-02-search-toggle
        >
          <span class="header-02__icon" aria-hidden="true">⌕</span>
        </button>

        <a class="header-02__icon-button" href="#" aria-label="Wishlist">
          <span class="header-02__icon" aria-hidden="true">♡</span>
        </a>

        <a class="header-02__icon-button" href="#" aria-label="Account">
          <span class="header-02__icon" aria-hidden="true">◉</span>
        </a>

        <a class="header-02__icon-button header-02__cart" href="#" aria-label="Cart with 2 items">
          <span class="header-02__icon" aria-hidden="true">👜</span>
          <span class="header-02__cart-badge" aria-hidden="true">2</span>
        </a>

        <button class="header-02__icon-button" type="button" aria-label="Toggle theme" data-header-02-theme-toggle>
          <span class="header-02__icon" aria-hidden="true">◐</span>
        </button>
      </div>
    </div>
  </div>

  <div class="header-02__search-panel" id="header-02-search-panel" data-header-02-search-panel hidden>
    <div class="header-02__container">
      <form class="header-02__search-form" role="search" aria-label="Site search">
        <label class="header-02__search-label" for="header-02-search-input">Search products</label>
        <input
          class="header-02__search-input"
          id="header-02-search-input"
          type="search"
          name="q"
          placeholder="Search for jackets, footwear, accessories..."
        />
        <button class="header-02__search-submit" type="submit">Search</button>
      </form>
    </div>
  </div>

  <aside class="header-02__mobile-nav" id="header-02-mobile-nav" data-header-02-mobile-nav aria-label="Mobile menu" hidden>
    <div class="header-02__mobile-nav-head">
      <p class="header-02__mobile-title">Browse</p>
      <button class="header-02__icon-button" type="button" aria-label="Close menu" data-header-02-menu-close>
        <span class="header-02__icon" aria-hidden="true">✕</span>
      </button>
    </div>

    <nav class="header-02__mobile-nav-body" aria-label="Mobile primary navigation">
      <a class="header-02__mobile-link" href="#">New In</a>
      <a class="header-02__mobile-link" href="#">Women</a>
      <a class="header-02__mobile-link" href="#">Men</a>
      <a class="header-02__mobile-link" href="#">Accessories</a>
      <a class="header-02__mobile-link" href="#">Collections</a>
      <a class="header-02__mobile-link" href="#">Sale</a>
    </nav>

    <div class="header-02__mobile-actions" aria-label="Mobile account actions">
      <a class="header-02__mobile-action" href="#">Wishlist</a>
      <a class="header-02__mobile-action" href="#">Account</a>
      <a class="header-02__mobile-action" href="#">Cart (2)</a>
    </div>
  </aside>

  <div class="header-02__backdrop" data-header-02-backdrop hidden></div>
</header>
