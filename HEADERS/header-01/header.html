<header class="header-01" data-header-01>
  <div class="header-01__inner">
    <a class="header-01__brand" href="#" aria-label="Atelier North home">
      <span class="header-01__brand-mark" aria-hidden="true">AN</span>
      <span class="header-01__brand-text">Atelier North</span>
    </a>

    <button
      class="header-01__menu-toggle"
      type="button"
      data-header-01-menu-toggle
      aria-expanded="false"
      aria-controls="header-01-mobile-panel"
      aria-label="Open navigation menu"
    >
      <span class="header-01__menu-toggle-line" aria-hidden="true"></span>
      <span class="header-01__menu-toggle-line" aria-hidden="true"></span>
      <span class="header-01__menu-toggle-line" aria-hidden="true"></span>
    </button>

    <nav class="header-01__nav" aria-label="Primary">
      <ul class="header-01__nav-list">
        <li class="header-01__nav-item"><a class="header-01__nav-link" href="#">Work</a></li>
        <li class="header-01__nav-item"><a class="header-01__nav-link" href="#">Journal</a></li>
        <li class="header-01__nav-item"><a class="header-01__nav-link" href="#">Travel</a></li>
        <li class="header-01__nav-item"><a class="header-01__nav-link" href="#">Studio</a></li>
      </ul>
    </nav>

    <div class="header-01__actions">
      <a class="header-01__cta" href="#">Contact</a>
      <button
        class="header-01__theme-toggle"
        type="button"
        data-header-01-theme-toggle
        aria-label="Switch to dark theme"
        aria-pressed="false"
      >
        <span class="header-01__theme-toggle-dot" aria-hidden="true"></span>
      </button>
    </div>
  </div>

  <div
    class="header-01__mobile-panel"
    id="header-01-mobile-panel"
    data-header-01-mobile-panel
    hidden
  >
    <nav class="header-01__mobile-nav" aria-label="Mobile primary">
      <ul class="header-01__mobile-nav-list">
        <li class="header-01__mobile-nav-item"><a class="header-01__mobile-nav-link" href="#">Work</a></li>
        <li class="header-01__mobile-nav-item"><a class="header-01__mobile-nav-link" href="#">Journal</a></li>
        <li class="header-01__mobile-nav-item"><a class="header-01__mobile-nav-link" href="#">Travel</a></li>
        <li class="header-01__mobile-nav-item"><a class="header-01__mobile-nav-link" href="#">Studio</a></li>
        <li class="header-01__mobile-nav-item"><a class="header-01__mobile-nav-link" href="#">Contact</a></li>
      </ul>
    </nav>
  </div>
</header>
