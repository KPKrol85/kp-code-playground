<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Header 03 - Glass / Frosted Tech</title>
    <link rel="stylesheet" href="./header.css" />
  </head>
  <body>
    <header class="header-03" data-header-03>
      <div class="header-03__shell">
        <a class="header-03__brand" href="#" aria-label="NeuraStack home">
          <span class="header-03__brand-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path
                d="M12 2 4.5 6.25v11.5L12 22l7.5-4.25V6.25L12 2Zm0 2.24 5.5 3.11v8.3L12 18.76l-5.5-3.11v-8.3L12 4.24Zm-3.25 4.6h2.5V15h-2.5V8.84Zm4 0h2.5V15h-2.5V8.84Z"
              />
            </svg>
          </span>
          <span class="header-03__brand-text">NeuraStack</span>
        </a>

        <button
          class="header-03__menu-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="header-03-mobile-nav"
          aria-label="Open navigation menu"
          data-header-03-menu-toggle
        >
          <span class="header-03__menu-bar" aria-hidden="true"></span>
          <span class="header-03__menu-bar" aria-hidden="true"></span>
          <span class="header-03__menu-bar" aria-hidden="true"></span>
        </button>

        <nav class="header-03__nav" aria-label="Primary">
          <ul class="header-03__nav-list">
            <li class="header-03__nav-item"><a class="header-03__nav-link" href="#">Product</a></li>
            <li class="header-03__nav-item"><a class="header-03__nav-link" href="#">Solutions</a></li>
            <li class="header-03__nav-item"><a class="header-03__nav-link" href="#">Pricing</a></li>
            <li class="header-03__nav-item"><a class="header-03__nav-link" href="#">Docs</a></li>
          </ul>
        </nav>

        <div class="header-03__actions">
          <button
            class="header-03__theme-toggle"
            type="button"
            aria-label="Switch to dark theme"
            data-header-03-theme-toggle
          >
            <span class="header-03__theme-icon header-03__theme-icon--sun" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M12 16.1a4.1 4.1 0 1 1 0-8.2 4.1 4.1 0 0 1 0 8.2Zm0-12.1a.9.9 0 0 1 .9.9v1.6a.9.9 0 1 1-1.8 0V4.9a.9.9 0 0 1 .9-.9Zm0 13.6a.9.9 0 0 1 .9.9v1.6a.9.9 0 1 1-1.8 0v-1.6a.9.9 0 0 1 .9-.9Zm8-5.6a.9.9 0 0 1-.9.9h-1.6a.9.9 0 1 1 0-1.8h1.6a.9.9 0 0 1 .9.9Zm-13.6 0a.9.9 0 0 1-.9.9H3.9a.9.9 0 1 1 0-1.8h1.6a.9.9 0 0 1 .9.9Zm10.03-4.84a.9.9 0 0 1 1.27 0l1.14 1.14a.9.9 0 0 1-1.27 1.27l-1.14-1.14a.9.9 0 0 1 0-1.27Zm-10.31 10.3a.9.9 0 0 1 1.27 0l1.14 1.14a.9.9 0 1 1-1.27 1.27l-1.14-1.14a.9.9 0 0 1 0-1.27Zm0-9.03a.9.9 0 0 1 0 1.27L4.98 10.83A.9.9 0 1 1 3.71 9.56l1.14-1.14a.9.9 0 0 1 1.27 0Zm10.3 10.31a.9.9 0 0 1 0 1.27l-1.14 1.14a.9.9 0 1 1-1.27-1.27l1.14-1.14a.9.9 0 0 1 1.27 0Z" />
              </svg>
            </span>
            <span class="header-03__theme-icon header-03__theme-icon--moon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M12.76 3.6a1 1 0 0 1 .92 1.5 7.44 7.44 0 0 0-.72 3.18 7.53 7.53 0 0 0 7.52 7.52 7.4 7.4 0 0 0 2.7-.5 1 1 0 0 1 1.28 1.2A10.13 10.13 0 1 1 11.8 3.82a1 1 0 0 1 .96-.22Zm-2.5 2.82a8.13 8.13 0 1 0 10.15 10.15l-.01.01a9.53 9.53 0 0 1-9.44-9.44l.01-.72-.71.01Z" />
              </svg>
            </span>
            <span class="header-03__theme-label" data-header-03-theme-label>Light</span>
          </button>
          <a class="header-03__cta" href="#">Start free</a>
        </div>
      </div>

      <nav
        class="header-03__mobile-nav"
        id="header-03-mobile-nav"
        aria-label="Mobile"
        hidden
        data-header-03-mobile-nav
      >
        <ul class="header-03__mobile-list">
          <li class="header-03__mobile-item"><a class="header-03__mobile-link" href="#">Product</a></li>
          <li class="header-03__mobile-item"><a class="header-03__mobile-link" href="#">Solutions</a></li>
          <li class="header-03__mobile-item"><a class="header-03__mobile-link" href="#">Pricing</a></li>
          <li class="header-03__mobile-item"><a class="header-03__mobile-link" href="#">Docs</a></li>
          <li class="header-03__mobile-item"><a class="header-03__mobile-link" href="#">Contact sales</a></li>
        </ul>
      </nav>
    </header>

    <main class="header-03__demo" aria-label="Demo content">
      <h1 class="header-03__demo-title">Header 03 – Glass / Frosted Tech</h1>
      <p class="header-03__demo-text">
        Reusable floating header intended for premium SaaS and AI product landing pages.
      </p>
    </main>

    <script src="./header.js"></script>
  </body>
</html>
