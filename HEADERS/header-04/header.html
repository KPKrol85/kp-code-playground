<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Header 04 - Bold Corporate Navigation</title>
    <link rel="stylesheet" href="./header.css" />
  </head>
  <body>
    <header class="header-04" data-header-04>
      <div class="header-04__inner">
        <a class="header-04__brand" href="#" aria-label="Northgrid home">
          <span class="header-04__brand-mark" aria-hidden="true">NG</span>
          <span class="header-04__brand-text">
            <span class="header-04__brand-name">Northgrid</span>
            <span class="header-04__brand-tag">Enterprise Cloud Platform</span>
          </span>
        </a>

        <button
          class="header-04__menu-toggle"
          type="button"
          aria-label="Open navigation menu"
          aria-controls="header-04-mobile-panel"
          aria-expanded="false"
          data-header-04-menu-toggle
        >
          <span class="header-04__menu-line" aria-hidden="true"></span>
          <span class="header-04__menu-line" aria-hidden="true"></span>
          <span class="header-04__menu-line" aria-hidden="true"></span>
        </button>

        <nav class="header-04__nav" aria-label="Primary">
          <ul class="header-04__nav-list">
            <li><a class="header-04__nav-link" href="#">Products</a></li>
            <li><a class="header-04__nav-link" href="#">Solutions</a></li>
            <li><a class="header-04__nav-link" href="#">Industries</a></li>
            <li><a class="header-04__nav-link" href="#">Resources</a></li>
            <li><a class="header-04__nav-link" href="#">Pricing</a></li>
          </ul>
        </nav>

        <div class="header-04__actions">
          <a class="header-04__utility-link" href="#">Contact Sales</a>
          <a class="header-04__utility-link" href="#">Sign in</a>
          <button
            class="header-04__theme-toggle"
            type="button"
            aria-label="Switch to dark theme"
            data-header-04-theme-toggle
          >
            <span class="header-04__theme-icon" aria-hidden="true">☀</span>
          </button>
          <a class="header-04__cta" href="#">Request Demo</a>
        </div>
      </div>

      <div
        class="header-04__mobile-panel"
        id="header-04-mobile-panel"
        aria-label="Mobile navigation"
        data-header-04-mobile-panel
        hidden
      >
        <div class="header-04__mobile-section">
          <p class="header-04__mobile-heading">Navigate</p>
          <a class="header-04__mobile-link" href="#">Products</a>
          <a class="header-04__mobile-link" href="#">Solutions</a>
          <a class="header-04__mobile-link" href="#">Industries</a>
          <a class="header-04__mobile-link" href="#">Resources</a>
          <a class="header-04__mobile-link" href="#">Pricing</a>
        </div>

        <div class="header-04__mobile-section">
          <p class="header-04__mobile-heading">Account</p>
          <a class="header-04__mobile-link" href="#">Contact Sales</a>
          <a class="header-04__mobile-link" href="#">Sign in</a>
          <a class="header-04__mobile-cta" href="#">Request Demo</a>
        </div>
      </div>
    </header>

    <script src="./header.js"></script>
  </body>
</html>
