name: FlowDesk Quality

on:
  pull_request:
    paths:
      - 'pr-01-flowdesk/**'
      - '.github/workflows/flowdesk-quality.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'pr-01-flowdesk/**'
      - '.github/workflows/flowdesk-quality.yml'

jobs:
  quality:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pr-01-flowdesk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: pr-01-flowdesk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: PWA manifest check
        run: npm run pwa:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Accessibility tests
        run: npm run test:a11y

      - name: Build
        run: npm run build

      - name: Performance budget
        run: npm run perf:budget
