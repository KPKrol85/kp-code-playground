name: Monitor External Links

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  external-link-monitor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gastronomy/html-css-js/pr-02-atelier
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: gastronomy/html-css-js/pr-02-atelier/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run external link monitor
        run: |
          mkdir -p artifacts
          npm run check:server:external 2>&1 | tee artifacts/external-link-report.txt

      - name: Upload external link report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-link-report
          path: gastronomy/html-css-js/pr-02-atelier/artifacts/external-link-report.txt
          if-no-files-found: error
          retention-days: 30
