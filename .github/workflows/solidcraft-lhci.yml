name: SolidCraft Lighthouse CI

on:
  push:
    paths:
      - 'construction/html-css-js/pr-01-solidcraft/**'
      - '.github/workflows/solidcraft-lhci.yml'
  pull_request:
    paths:
      - 'construction/html-css-js/pr-01-solidcraft/**'
      - '.github/workflows/solidcraft-lhci.yml'

jobs:
  lhci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: construction/html-css-js/pr-01-solidcraft

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: construction/html-css-js/pr-01-solidcraft/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse CI
        run: npm run qa:lhci

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solidcraft-lighthouse-reports
          path: construction/html-css-js/pr-01-solidcraft/.lighthouseci
          if-no-files-found: warn
