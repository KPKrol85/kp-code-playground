<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halo Sheet Modal</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="halo-demo">
      <h1 class="halo-demo__title">Halo Sheet</h1>
      <p class="halo-demo__intro">
        A minimal modal pattern focused on calm spacing, clarity, and subtle motion.
      </p>
      <button class="halo-trigger" type="button" data-halo-open>
        Open Halo Sheet
      </button>
    </main>

    <div class="halo-modal" data-halo-modal hidden>
      <div class="halo-modal__backdrop" data-halo-close tabindex="-1"></div>

      <section
        class="halo-modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="halo-sheet-title"
        aria-describedby="halo-sheet-description"
        tabindex="-1"
      >
        <header class="halo-modal__header">
          <h2 id="halo-sheet-title" class="halo-modal__title">Halo Sheet</h2>
          <button
            class="halo-modal__icon-close"
            type="button"
            aria-label="Close Halo Sheet"
            data-halo-close
          >
            <span aria-hidden="true">×</span>
          </button>
        </header>

        <div class="halo-modal__body">
          <p id="halo-sheet-description">
            This modal keeps communication short and focused, offering a light,
            premium-feeling container for brief informational content.
          </p>
        </div>

        <div class="halo-modal__actions">
          <button class="halo-modal__close-btn" type="button" data-halo-close>
            Close
          </button>
        </div>
      </section>
    </div>
  </body>
</html>
