<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verdict Modal</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="verdict-demo">
      <section class="verdict-demo__panel" aria-labelledby="verdict-demo-title">
        <h1 id="verdict-demo-title">Verdict Modal</h1>
        <p>
          Use this confirmation modal to protect high-impact actions and keep
          decisions clear before final submission.
        </p>
        <button
          class="verdict-trigger"
          type="button"
          id="openVerdictModal"
          aria-haspopup="dialog"
        >
          Delete project draft
        </button>
      </section>
    </main>

    <div class="verdict-modal" id="verdictModal" aria-hidden="true">
      <div class="verdict-modal__backdrop" data-close="true"></div>

      <section
        class="verdict-modal__dialog"
        role="alertdialog"
        aria-modal="true"
        aria-labelledby="verdictTitle"
        aria-describedby="verdictDescription"
        tabindex="-1"
      >
        <header class="verdict-modal__header">
          <p class="verdict-modal__eyebrow">Verdict Modal</p>
          <button
            type="button"
            class="verdict-modal__close"
            id="closeVerdictModal"
            aria-label="Close confirmation modal"
          >
            <span aria-hidden="true">×</span>
          </button>
        </header>

        <div class="verdict-modal__content">
          <h2 id="verdictTitle">Delete this project draft?</h2>
          <p id="verdictDescription">
            This removes all unsaved changes and cannot be undone. Confirm only
            if you are sure you no longer need this draft.
          </p>
        </div>

        <footer class="verdict-modal__actions">
          <button type="button" class="verdict-btn verdict-btn--neutral" data-close="true">
            Keep draft
          </button>
          <button type="button" class="verdict-btn verdict-btn--danger" id="confirmDelete">
            Yes, delete draft
          </button>
        </footer>
      </section>
    </div>
  </body>
</html>
