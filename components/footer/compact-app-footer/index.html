<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compact App Footer | KP_Code Digital Vault</title>
    <meta
      name="description"
      content="Premium compact app footer component preview for KP_Code Digital Vault tools."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="caf-preview" aria-labelledby="preview-title">
      <div class="caf-preview__content">
        <p class="caf-preview__eyebrow">Component Preview</p>
        <h1 id="preview-title">Compact App Footer</h1>
        <p>
          Designed for focused calculators, trackers, generators, and utility apps that need a
          clear but low-profile footer.
        </p>
      </div>
    </main>

    <footer class="caf-footer" aria-label="Vault Calculator footer">
      <div class="caf-footer__brand" aria-label="Product details">
        <a class="caf-footer__product" href="#" aria-label="Vault Calculator home">Vault Calculator</a>
        <p class="caf-footer__suite">KP_Code Digital Vault</p>
      </div>

      <nav class="caf-footer__nav" aria-label="Footer utility links">
        <a href="#" class="caf-footer__link">Help</a>
        <a href="#" class="caf-footer__link">Privacy</a>
        <a href="#" class="caf-footer__link">Terms</a>
        <a href="#" class="caf-footer__link">Feedback</a>
      </nav>

      <div class="caf-footer__meta" aria-label="Version and status">
        <span class="caf-footer__version" title="Current build version">v1.0</span>
        <button type="button" class="caf-footer__status" data-status-toggle aria-live="polite">
          Saved locally
        </button>
      </div>

      <small class="caf-footer__copyright">
        © <span data-current-year>2026</span> KP_Code Digital Vault
      </small>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
