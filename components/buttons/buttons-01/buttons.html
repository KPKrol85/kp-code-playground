<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buttons 01 - Premium Reusable Pack</title>
    <link rel="stylesheet" href="buttons.css" />
  </head>
  <body>
    <main class="buttons-pack" aria-labelledby="buttons-pack-title">
      <section class="buttons-pack__section">
        <header class="buttons-pack__header">
          <p class="buttons-pack__eyebrow">Buttons 01</p>
          <h1 class="buttons-pack__title" id="buttons-pack-title">
            Premium Button System
          </h1>
          <p class="buttons-pack__description">
            Three modern, reusable button variants designed for high-end travel,
            hospitality, SaaS, and portfolio interfaces.
          </p>
        </header>

        <div class="buttons-pack__groups" role="group" aria-label="Button variant examples">
          <article class="buttons-pack__group" aria-labelledby="variant-primary-title">
            <h2 class="buttons-pack__group-title" id="variant-primary-title">Primary / Aurora</h2>
            <div class="buttons-pack__row">
              <button class="btn btn--aurora" type="button">
                <span class="btn__label">Reserve Experience</span>
              </button>
              <button class="btn btn--aurora" type="button" disabled>
                <span class="btn__label">Processing</span>
              </button>
            </div>
          </article>

          <article class="buttons-pack__group" aria-labelledby="variant-outline-title">
            <h2 class="buttons-pack__group-title" id="variant-outline-title">Secondary / Crest</h2>
            <div class="buttons-pack__row">
              <button class="btn btn--crest" type="button">
                <span class="btn__label">View Itinerary</span>
              </button>
              <button class="btn btn--crest" type="button" disabled>
                <span class="btn__label">Unavailable</span>
              </button>
            </div>
          </article>

          <article class="buttons-pack__group" aria-labelledby="variant-accent-title">
            <h2 class="buttons-pack__group-title" id="variant-accent-title">Accent / Orbit</h2>
            <div class="buttons-pack__row">
              <button class="btn btn--orbit" type="button">
                <span class="btn__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M12 3a9 9 0 1 0 9 9h-2a7 7 0 1 1-7-7V3zm1 0v2.06A7.02 7.02 0 0 1 18.94 11H21a9 9 0 0 0-8-8z" />
                  </svg>
                </span>
                <span class="btn__label">Track Booking</span>
                <span class="btn__icon btn__icon--end" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M13.17 5 12 6.17 16.83 11H4v2h12.83L12 17.83 13.17 19 20 12z" />
                  </svg>
                </span>
              </button>
              <button class="btn btn--orbit" type="button" disabled>
                <span class="btn__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M12 3a9 9 0 1 0 9 9h-2a7 7 0 1 1-7-7V3zm1 0v2.06A7.02 7.02 0 0 1 18.94 11H21a9 9 0 0 0-8-8z" />
                  </svg>
                </span>
                <span class="btn__label">Syncing</span>
              </button>
            </div>
          </article>
        </div>
      </section>
    </main>

    <script src="buttons.js"></script>
  </body>
</html>
