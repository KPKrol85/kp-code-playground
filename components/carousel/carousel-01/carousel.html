<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Gallery Carousel 01</title>
    <link rel="stylesheet" href="carousel.css" />
  </head>
  <body>
    <section class="premium-carousel" aria-label="Curated destinations gallery">
      <div class="premium-carousel__intro">
        <p class="premium-carousel__eyebrow">Curated Escapes</p>
        <h1 class="premium-carousel__heading">Premium Gallery Carousel</h1>
        <p class="premium-carousel__lead">
          A refined image-first carousel suited for hospitality, travel, and editorial portfolio layouts.
        </p>
      </div>

      <div class="premium-carousel__shell">
        <div class="premium-carousel__viewport" id="premium-carousel-viewport" aria-live="polite">
          <ol class="premium-carousel__track" id="premium-carousel-track">
            <li class="premium-carousel__slide premium-carousel__slide--active" data-index="0" aria-hidden="false">
              <figure class="premium-carousel__figure">
                <img
                  class="premium-carousel__image"
                  src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1800 1200'%3E%3Cdefs%3E%3ClinearGradient id='g1' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23131e35'/%3E%3Cstop offset='100%25' stop-color='%2361789a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='1800' height='1200' fill='url(%23g1)'/%3E%3Ccircle cx='1320' cy='360' r='300' fill='%23ffffff12'/%3E%3Cpath d='M0 850 Q450 620 900 820 T1800 760 L1800 1200 L0 1200 Z' fill='%23f4ede220'/%3E%3Ctext x='120' y='1060' fill='%23f8f6f2' font-size='88' font-family='Georgia, serif'%3EAlpine Residences%3C/text%3E%3C/svg%3E"
                  alt="Mountain-facing alpine residences at dusk"
                />
                <figcaption class="premium-carousel__caption">
                  <span class="premium-carousel__label">Switzerland · Retreat</span>
                  <h2 class="premium-carousel__title">Alpine Residences at Dusk</h2>
                  <p class="premium-carousel__description">
                    Quiet timber silhouettes, warm interior lighting, and long mountain views designed for slow evenings.
                  </p>
                </figcaption>
              </figure>
            </li>

            <li class="premium-carousel__slide" data-index="1" aria-hidden="true">
              <figure class="premium-carousel__figure">
                <img
                  class="premium-carousel__image"
                  src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1800 1200'%3E%3Cdefs%3E%3ClinearGradient id='g2' x1='0.1' y1='0' x2='0.9' y2='1'%3E%3Cstop offset='0%25' stop-color='%2323262f'/%3E%3Cstop offset='100%25' stop-color='%23737f91'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='1800' height='1200' fill='url(%23g2)'/%3E%3Crect x='220' y='170' width='1360' height='820' fill='%23ffffff10' rx='24'/%3E%3Cpath d='M260 900 L700 460 L1020 710 L1270 560 L1540 890' stroke='%23f6f0e6aa' stroke-width='26' fill='none'/%3E%3Ctext x='120' y='1060' fill='%23f8f6f2' font-size='88' font-family='Georgia, serif'%3EGallery Atrium%3C/text%3E%3C/svg%3E"
                  alt="Modern gallery atrium with geometric skylight"
                />
                <figcaption class="premium-carousel__caption">
                  <span class="premium-carousel__label">Copenhagen · Architecture</span>
                  <h2 class="premium-carousel__title">Gallery Atrium Light Study</h2>
                  <p class="premium-carousel__description">
                    Balanced geometry and sculptural light shape a calm interior language for contemporary collections.
                  </p>
                </figcaption>
              </figure>
            </li>

            <li class="premium-carousel__slide" data-index="2" aria-hidden="true">
              <figure class="premium-carousel__figure">
                <img
                  class="premium-carousel__image"
                  src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1800 1200'%3E%3Cdefs%3E%3ClinearGradient id='g3' x1='0' y1='0' x2='0.9' y2='1'%3E%3Cstop offset='0%25' stop-color='%23151c23'/%3E%3Cstop offset='100%25' stop-color='%23658390'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='1800' height='1200' fill='url(%23g3)'/%3E%3Cpath d='M140 840 C380 660 660 690 940 830 C1160 930 1410 940 1660 780' stroke='%23f2ece1aa' stroke-width='20' fill='none'/%3E%3Ccircle cx='1380' cy='380' r='220' fill='%23ffffff0f'/%3E%3Ctext x='120' y='1060' fill='%23f8f6f2' font-size='88' font-family='Georgia, serif'%3ECoastal Table%3C/text%3E%3C/svg%3E"
                  alt="Coastal restaurant dining concept overlooking the sea"
                />
                <figcaption class="premium-carousel__caption">
                  <span class="premium-carousel__label">Amalfi · Hospitality</span>
                  <h2 class="premium-carousel__title">Coastal Table Experience</h2>
                  <p class="premium-carousel__description">
                    Sunset palettes and layered stone textures deliver an intimate restaurant atmosphere by the water.
                  </p>
                </figcaption>
              </figure>
            </li>

            <li class="premium-carousel__slide" data-index="3" aria-hidden="true">
              <figure class="premium-carousel__figure">
                <img
                  class="premium-carousel__image"
                  src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1800 1200'%3E%3Cdefs%3E%3ClinearGradient id='g4' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%231f1b21'/%3E%3Cstop offset='100%25' stop-color='%23726a7f'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='1800' height='1200' fill='url(%23g4)'/%3E%3Crect x='300' y='250' width='1200' height='700' rx='28' fill='%23ffffff11'/%3E%3Cpath d='M360 870 H1440' stroke='%23f3eee4cc' stroke-width='16'/%3E%3Cpath d='M540 300 V900 M900 300 V900 M1260 300 V900' stroke='%23f3eee460' stroke-width='10'/%3E%3Ctext x='120' y='1060' fill='%23f8f6f2' font-size='88' font-family='Georgia, serif'%3EEditorial Loft%3C/text%3E%3C/svg%3E"
                  alt="Minimal editorial loft interior with layered textures"
                />
                <figcaption class="premium-carousel__caption">
                  <span class="premium-carousel__label">Tokyo · Interiors</span>
                  <h2 class="premium-carousel__title">Editorial Loft Composition</h2>
                  <p class="premium-carousel__description">
                    Textural neutrals, disciplined lines, and ambient contrast for premium editorial visual storytelling.
                  </p>
                </figcaption>
              </figure>
            </li>

            <li class="premium-carousel__slide" data-index="4" aria-hidden="true">
              <figure class="premium-carousel__figure">
                <img
                  class="premium-carousel__image"
                  src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1800 1200'%3E%3Cdefs%3E%3ClinearGradient id='g5' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23131f26'/%3E%3Cstop offset='100%25' stop-color='%235b7478'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='1800' height='1200' fill='url(%23g5)'/%3E%3Cpath d='M0 920 C260 820 500 880 760 790 C1040 700 1260 640 1800 730 L1800 1200 L0 1200 Z' fill='%23f4ede428'/%3E%3Ccircle cx='420' cy='350' r='180' fill='%23ffffff0d'/%3E%3Ctext x='120' y='1060' fill='%23f8f6f2' font-size='88' font-family='Georgia, serif'%3EDesert Poolhouse%3C/text%3E%3C/svg%3E"
                  alt="Desert poolhouse with layered landscaping"
                />
                <figcaption class="premium-carousel__caption">
                  <span class="premium-carousel__label">Marrakech · Landscape</span>
                  <h2 class="premium-carousel__title">Desert Poolhouse Serenity</h2>
                  <p class="premium-carousel__description">
                    Warm stone gradients and still water reflections create a tranquil, cinematic hospitality frame.
                  </p>
                </figcaption>
              </figure>
            </li>
          </ol>
        </div>

        <div class="premium-carousel__controls">
          <button
            class="premium-carousel__nav-button premium-carousel__nav-button--prev"
            type="button"
            aria-label="Previous slide"
            aria-controls="premium-carousel-track"
          >
            <span class="premium-carousel__nav-icon" aria-hidden="true">←</span>
          </button>

          <div class="premium-carousel__status" aria-live="polite">
            <span class="premium-carousel__counter" id="premium-carousel-counter">01 / 05</span>
            <span class="premium-carousel__progress-track" aria-hidden="true">
              <span class="premium-carousel__progress-fill" id="premium-carousel-progress"></span>
            </span>
          </div>

          <button
            class="premium-carousel__nav-button premium-carousel__nav-button--next"
            type="button"
            aria-label="Next slide"
            aria-controls="premium-carousel-track"
          >
            <span class="premium-carousel__nav-icon" aria-hidden="true">→</span>
          </button>
        </div>

        <div class="premium-carousel__thumbnails" role="tablist" aria-label="Choose gallery slide">
          <button class="premium-carousel__thumbnail premium-carousel__thumbnail--active" type="button" role="tab" aria-selected="true" aria-label="Go to slide 1" data-index="0">
            <img
              class="premium-carousel__thumbnail-image"
              src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 200'%3E%3Cdefs%3E%3ClinearGradient id='t1' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23131e35'/%3E%3Cstop offset='100%25' stop-color='%2361789a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='320' height='200' fill='url(%23t1)'/%3E%3C/svg%3E"
              alt="Alpine thumbnail"
            />
          </button>
          <button class="premium-carousel__thumbnail" type="button" role="tab" aria-selected="false" aria-label="Go to slide 2" data-index="1">
            <img class="premium-carousel__thumbnail-image" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 200'%3E%3Cdefs%3E%3ClinearGradient id='t2' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2323262f'/%3E%3Cstop offset='100%25' stop-color='%23737f91'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='320' height='200' fill='url(%23t2)'/%3E%3C/svg%3E" alt="Atrium thumbnail" />
          </button>
          <button class="premium-carousel__thumbnail" type="button" role="tab" aria-selected="false" aria-label="Go to slide 3" data-index="2">
            <img class="premium-carousel__thumbnail-image" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 200'%3E%3Cdefs%3E%3ClinearGradient id='t3' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23151c23'/%3E%3Cstop offset='100%25' stop-color='%23658390'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='320' height='200' fill='url(%23t3)'/%3E%3C/svg%3E" alt="Coastal thumbnail" />
          </button>
          <button class="premium-carousel__thumbnail" type="button" role="tab" aria-selected="false" aria-label="Go to slide 4" data-index="3">
            <img class="premium-carousel__thumbnail-image" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 200'%3E%3Cdefs%3E%3ClinearGradient id='t4' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%231f1b21'/%3E%3Cstop offset='100%25' stop-color='%23726a7f'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='320' height='200' fill='url(%23t4)'/%3E%3C/svg%3E" alt="Loft thumbnail" />
          </button>
          <button class="premium-carousel__thumbnail" type="button" role="tab" aria-selected="false" aria-label="Go to slide 5" data-index="4">
            <img class="premium-carousel__thumbnail-image" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 200'%3E%3Cdefs%3E%3ClinearGradient id='t5' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23131f26'/%3E%3Cstop offset='100%25' stop-color='%235b7478'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='320' height='200' fill='url(%23t5)'/%3E%3C/svg%3E" alt="Poolhouse thumbnail" />
          </button>
        </div>
      </div>
    </section>

    <script src="carousel.js"></script>
  </body>
</html>
