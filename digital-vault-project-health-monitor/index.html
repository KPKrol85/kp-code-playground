<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Health Monitor | Digital Vault</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="assets/js/main.js" defer></script>
</head>
<body>
  <header class="hero">
    <div class="container hero__content">
      <p class="badge">Digital Vault Tool</p>
      <h1>Project Health Monitor</h1>
      <p class="subtitle">Assess active client project health, detect risks, and generate operational status communication in minutes.</p>
    </div>
  </header>

  <main class="container layout">
    <section class="card" aria-labelledby="snapshot-title">
      <h2 id="snapshot-title">Project Snapshot</h2>
      <form id="snapshot-form" class="form-grid">
        <label>Client name<input type="text" name="clientName" /></label>
        <label>Project name<input type="text" name="projectName" /></label>
        <label>Project type
          <select name="projectType">
            <option value="">Select project type</option>
            <option>Business website</option><option>Landing page</option><option>E-commerce</option><option>Portfolio</option><option>Blog / content site</option><option>Web app / dashboard</option><option>Existing website redesign</option><option>Other</option>
          </select>
        </label>
        <label>Current project phase
          <select name="projectPhase">
            <option value="">Select phase</option>
            <option>Discovery</option><option>Content collection</option><option>Design</option><option>Development</option><option>Review</option><option>Revisions</option><option>Pre-launch</option><option>Launched</option><option>Maintenance</option>
          </select>
        </label>
        <label>Planned launch date<input type="date" name="launchDate" /></label>
        <label>Last client response date<input type="date" name="lastResponseDate" /></label>
        <label>Next milestone<input type="text" name="nextMilestone" /></label>
        <label>Project owner<input type="text" name="projectOwner" /></label>
        <label class="full">Internal notes<textarea name="internalNotes" rows="4"></textarea></label>
      </form>
    </section>

    <aside class="card summary" id="live-summary" aria-live="polite"></aside>

    <section class="card" aria-labelledby="assessment-title">
      <h2 id="assessment-title">Health Assessment</h2>
      <div id="assessment-categories"></div>
    </section>

    <section class="card" aria-labelledby="report-title">
      <h2 id="report-title">Project Health Report</h2>
      <pre id="health-report" class="output"></pre>
    </section>

    <section class="card" aria-labelledby="client-update-title">
      <h2 id="client-update-title">Client Status Update Draft</h2>
      <pre id="client-update" class="output"></pre>
    </section>

    <section class="card actions" aria-label="Actions">
      <button id="copy-report" type="button">Copy health report</button>
      <button id="copy-client" type="button">Copy client update</button>
      <button id="print-report" type="button">Print / save as PDF</button>
      <button id="save-local" type="button">Save locally</button>
      <button id="reset-monitor" type="button" class="danger">Reset monitor</button>
      <p id="action-status" aria-live="polite" class="small"></p>
    </section>
  </main>
</body>
</html>
