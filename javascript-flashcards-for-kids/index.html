<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaScript Flashcards for Kids</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-header__title">JavaScript Flashcards for Kids</h1>
    <p class="app-header__tag">Learn JavaScript step by step with fun flashcards.</p>
  </header>

  <main class="app-main" id="app" aria-live="polite"></main>

  <template id="view-login">
    <section class="panel">
      <h2>Welcome, future coder! 👋</h2>
      <p>Let’s learn JavaScript basics with tiny wins every day.</p>
      <form id="login-form" class="form">
        <label for="learner-name">Learner name</label>
        <input id="learner-name" name="learnerName" maxlength="24" required placeholder="Type your name" />

        <fieldset>
          <legend>Choose an avatar</legend>
          <div id="avatar-options" class="avatar-grid"></div>
        </fieldset>

        <button type="submit" class="btn btn--primary">Start learning</button>
      </form>
      <p class="note">Parent/Teacher note: this app stores progress only in this browser using local storage.</p>
    </section>
  </template>

  <script src="script.js"></script>
</body>
</html>
