<svg width="860" height="640" viewBox="0 0 860 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hero-visual-title hero-visual-desc">
  <title id="hero-visual-title">Aurora dashboard preview placeholder</title>
  <desc id="hero-visual-desc">Layered abstract interface cards, charts, and decorative orbital lines.</desc>
  <defs>
    <linearGradient id="hero-bg" x1="96" y1="80" x2="764" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#233B80"/>
      <stop offset="0.56" stop-color="#15244D"/>
      <stop offset="1" stop-color="#0B1328"/>
    </linearGradient>
    <linearGradient id="hero-card" x1="230" y1="178" x2="620" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFF3FF"/>
      <stop offset="1" stop-color="#D5E2FF"/>
    </linearGradient>
    <linearGradient id="hero-accent" x1="318" y1="284" x2="562" y2="284" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8AF8D6"/>
      <stop offset="1" stop-color="#8F7DFF"/>
    </linearGradient>
    <filter id="hero-blur" x="0" y="0" width="860" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect x="40" y="40" width="780" height="560" rx="40" fill="url(#hero-bg)"/>

  <g opacity="0.38" filter="url(#hero-blur)">
    <circle cx="226" cy="188" r="62" fill="#8AF8D6"/>
    <circle cx="612" cy="488" r="74" fill="#8F7DFF"/>
  </g>

  <g opacity="0.55">
    <ellipse cx="430" cy="324" rx="316" ry="162" stroke="#8AF8D6" stroke-width="2" stroke-dasharray="8 12"/>
    <ellipse cx="430" cy="324" rx="250" ry="116" stroke="#8F7DFF" stroke-width="2" stroke-dasharray="7 9"/>
  </g>

  <rect x="220" y="150" width="420" height="340" rx="28" fill="url(#hero-card)"/>
  <rect x="248" y="182" width="156" height="12" rx="6" fill="#D5E0F9"/>
  <rect x="248" y="208" width="118" height="12" rx="6" fill="#D5E0F9"/>

  <rect x="248" y="252" width="364" height="118" rx="16" fill="#F7F9FF"/>
  <path d="M280 330C314 286 356 334 392 288C426 246 470 308 510 278C538 256 568 264 586 296" stroke="url(#hero-accent)" stroke-width="10" stroke-linecap="round"/>

  <rect x="248" y="388" width="170" height="74" rx="14" fill="#EEF3FF"/>
  <rect x="432" y="388" width="180" height="74" rx="14" fill="#EEF3FF"/>
  <rect x="272" y="414" width="94" height="10" rx="5" fill="#C7D5F6"/>
  <rect x="456" y="414" width="108" height="10" rx="5" fill="#C7D5F6"/>

  <circle cx="643" cy="254" r="16" fill="#8AF8D6"/>
  <circle cx="205" cy="398" r="12" fill="#8F7DFF"/>
</svg>
